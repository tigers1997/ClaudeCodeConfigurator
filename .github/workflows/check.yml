name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Static validation (configure.py --check)
        run: python3 configure.py --check

      - name: Smoke-test scaffold (configure.py --yes --dry-run)
        run: |
          mkdir -p /tmp/cc-smoke
          python3 configure.py --yes --dry-run --dir /tmp/cc-smoke

      - name: Smoke-test every opt-in module combination
        run: |
          set -e
          for mod in multi-agent github-actions lockdown experiments-memory mcp ui; do
            target=$(mktemp -d)
            echo "--- scaffolding core + $mod into $target"
            python3 configure.py --yes --modules "core,$mod" --dry-run --dir "$target"
          done

      - name: Persona snapshot tests
        run: |
          set -e
          for p in solo-newer solo-experienced small-team library-author custom; do
            target=$(mktemp -d)
            python3 configure.py --persona "$p" --yes --dir "$target" >/dev/null
            actual=$(cd "$target" && find . -type f | LC_ALL=C sort)
            diff <(echo "$actual") "examples/persona-$p/expected-tree.txt" \
              || { echo "snapshot drift for persona=$p"; exit 1; }
          done
          echo "all 5 persona snapshots match"

      - name: Microbit enforcer fixture tests
        run: |
          set -e
          for t in test/microbit-enforcer/test-*.sh; do
            bash "$t"
          done

      - name: Slop-scan fixture tests
        run: |
          set -e
          for t in test/slop-scan/test-*.sh; do
            bash "$t"
          done

      - name: Efficiency-placeholder fixture tests
        run: |
          set -e
          for t in test/efficiency-placeholder/test-*.sh; do
            bash "$t"
          done

      - name: v1 legacy-config upgrade tests
        run: |
          set -e
          for t in test/v1-legacy-upgrade/test-*.sh; do
            bash "$t"
          done

      - name: v1 upgrade UX tests
        run: |
          set -e
          for t in test/v1-upgrade-ux/test-*.sh; do
            bash "$t"
          done

      - name: cc-manifest tests
        run: |
          set -e
          for t in test/cc-manifest/test-*.sh; do
            bash "$t"
          done

      - name: SessionStart drift-check hook tests
        run: |
          set -e
          for t in test/sessionstart-drift-check/test-*.sh; do
            bash "$t"
          done

      - name: repo_url placeholder tests
        run: |
          set -e
          for t in test/repo-url-placeholder/test-*.sh; do
            bash "$t"
          done

      - name: stop-run-checks fixture tests
        run: |
          set -e
          for t in test/stop-run-checks/test-*.sh; do
            bash "$t"
          done

      - name: repo-bootstrap fixture tests
        run: |
          set -e
          for t in test/repo-bootstrap/test-*.sh; do
            bash "$t"
          done

      - name: verify-setup fixture tests
        run: |
          set -e
          for t in test/verify-setup/test-*.sh; do
            bash "$t"
          done

      - name: Install jq for availability-check tests
        run: sudo apt-get install -y jq

      - name: Availability-check hook tests
        run: |
          set -e
          for t in test/availability-check/test-*.sh; do
            bash "$t"
          done
